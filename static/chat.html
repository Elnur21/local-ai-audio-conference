<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Səs Konfransı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #7c83fd; }
    header a {
      margin-left: auto;
      color: #555;
      text-decoration: none;
      font-size: 0.78rem;
      border: 1px solid #2a2a4a;
      padding: 4px 12px;
      border-radius: 20px;
      transition: all 0.2s;
    }
    header a:hover { color: #7c83fd; border-color: #7c83fd; }
    header .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #4caf50;
      transition: background 0.3s;
    }
    header .dot.recording { background: #f44336; animation: blink 0.6s infinite; }
    header .dot.processing { background: #ff9800; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 72%;
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 0.93rem;
      line-height: 1.55;
      animation: pop 0.25s ease;
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg .who {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      opacity: 0.55;
      margin-bottom: 4px;
    }
    .msg.user {
      background: #252560;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
      color: #cdd3ff;
    }
    .msg.ai {
      background: #1a2e1a;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      color: #c5ffc5;
    }
    .msg.err {
      background: #2e1a1a;
      color: #ffaaaa;
      align-self: center;
      max-width: 88%;
      text-align: center;
      border-radius: 12px;
    }

    footer {
      padding: 12px 16px 20px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #status { font-size: 0.82rem; color: #777; min-height: 18px; }

    #text-row {
      display: flex;
      width: 100%;
      max-width: 640px;
      gap: 8px;
      align-items: flex-end;
    }

    #textInput {
      flex: 1;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 22px;
      color: #e0e0e0;
      font-size: 0.92rem;
      padding: 10px 16px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.45;
      transition: border-color 0.2s;
      font-family: inherit;
      overflow-y: auto;
    }
    #textInput:focus { border-color: #7c83fd; }
    #textInput::placeholder { color: #444; }

    #sendBtn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: #7c83fd;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.2s;
    }
    #sendBtn:hover:not(:disabled) { transform: scale(1.08); }
    #sendBtn:disabled { background: #333; cursor: not-allowed; }

    #mic-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #mic {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: none;
      background: #7c83fd;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,131,253,0.45);
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
    }
    #mic:hover:not(:disabled) { transform: scale(1.06); }
    #mic.recording {
      background: #e53935;
      box-shadow: 0 4px 28px rgba(229,57,53,0.6);
      animation: pulse 0.9s infinite;
    }
    #mic:disabled { background: #333; cursor: not-allowed; box-shadow: none; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

    #clear {
      background: none;
      border: 1px solid #333;
      color: #666;
      padding: 5px 18px;
      border-radius: 20px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #clear:hover { border-color: #7c83fd; color: #7c83fd; }
  </style>
</head>
<body>

<header>
  <span>🎙️</span>
  <h1>AI Səs Konfransı</h1>
  <a href="/">← Ana səhifə</a>
  <a href="/admin">⚙️ Admin</a>
  <div class="dot" id="dot"></div>
</header>

<div id="conversation">
  <div class="msg ai">
    <div class="who">AI</div>
    Salam! Mikrofon düyməsini basıb danışın. Sizə Azərbaycan dilində cavab verəcəyəm.
  </div>
</div>

<footer>
  <div id="status">Danışmağa hazır</div>
  <div id="text-row">
    <textarea id="textInput" rows="1" placeholder="Mesaj yazın..."></textarea>
    <button id="sendBtn" onclick="sendText()">➤</button>
  </div>
  <div id="mic-row">
    <button id="mic" onclick="toggle()">🎙️</button>
    <button id="clear" onclick="clearChat()">Söhbəti sil</button>
  </div>
</footer>

<script>
  let recorder = null, chunks = [], recording = false, history = [];

  const micBtn    = document.getElementById('mic');
  const sendBtn   = document.getElementById('sendBtn');
  const textInput = document.getElementById('textInput');
  const statusEl  = document.getElementById('status');
  const dotEl     = document.getElementById('dot');
  const conv      = document.getElementById('conversation');

  textInput.addEventListener('input', () => {
    textInput.style.height = 'auto';
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
  });
  textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });

  function setDisabled(on) {
    micBtn.disabled = sendBtn.disabled = textInput.disabled = on;
  }

  function setState(s, text) {
    statusEl.textContent = text;
    dotEl.className = 'dot ' + s;
  }

  function addMsg(role, text) {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    const label = role === 'user' ? 'Siz' : role === 'ai' ? 'AI' : '';
    d.innerHTML = label ? `<div class="who">${label}</div>${text}` : text;
    conv.appendChild(d);
    conv.scrollTop = conv.scrollHeight;
    return d;
  }

  function playAudio(b64) {
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const audio = new Audio(URL.createObjectURL(new Blob([bytes], { type: 'audio/mpeg' })));
    setState('', 'Cavab oxunur...');
    audio.onended = () => setState('', 'Danışmağa hazır');
    audio.play();
  }

  // Reads an SSE stream from a fetch response.
  // userText: already-known user text (for /api/chat), or null (for /api/process where
  //           the server sends a "transcribed" event first).
  async function readStream(resp, userText) {
    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    let userBubble = userText ? addMsg('user', userText) : null;
    let aiBubble   = null;
    let aiContent  = null;
    let aiText     = '';

    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const ev = JSON.parse(line.slice(6));

          if (ev.type === 'transcribed') {
            userBubble = addMsg('user', ev.user_text);
            userText   = ev.user_text;

          } else if (ev.type === 'token') {
            if (!aiBubble) {
              aiBubble  = addMsg('ai', '');
              aiContent = aiBubble.querySelector
                ? (() => {
                    const s = document.createElement('span');
                    aiBubble.appendChild(s);
                    return s;
                  })()
                : aiBubble;
              // rebuild bubble properly
              aiBubble.innerHTML = '<div class="who">AI</div>';
              aiContent = document.createElement('span');
              aiBubble.appendChild(aiContent);
              conv.appendChild(aiBubble);
            }
            aiText += ev.content;
            aiContent.textContent = aiText;
            conv.scrollTop = conv.scrollHeight;

          } else if (ev.type === 'done') {
            history.push({ role: 'user',      content: userText });
            history.push({ role: 'assistant', content: aiText  });
            playAudio(ev.audio);

          } else if (ev.type === 'error') {
            if (aiBubble) aiBubble.remove();
            addMsg('err', '⚠️ ' + ev.message);
            setState('', 'Danışmağa hazır');
          }
        }
      }
    } catch (e) {
      addMsg('err', '⚠️ Xəta: ' + e.message);
      setState('', 'Danışmağa hazır');
    }
  }

  async function sendText() {
    const text = textInput.value.trim();
    if (!text) return;
    textInput.value = '';
    textInput.style.height = 'auto';
    setDisabled(true);
    setState('processing', 'Cavab gəlir...');

    const form = new FormData();
    form.append('text',    text);
    form.append('history', JSON.stringify(history));

    try {
      const resp = await fetch('/api/chat', { method: 'POST', body: form });
      await readStream(resp, text);
    } catch (e) {
      addMsg('err', '⚠️ Xəta: ' + e.message);
      setState('', 'Danışmağa hazır');
    } finally {
      setDisabled(false);
    }
  }

  async function toggle() {
    if (recording) { recorder.stop(); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      recorder = new MediaRecorder(stream);
      recorder.ondataavailable = e => e.data.size && chunks.push(e.data);
      recorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        recording = false;
        micBtn.classList.remove('recording');
        micBtn.textContent = '🎙️';
        await sendAudio(new Blob(chunks, { type: 'audio/webm' }));
      };
      recorder.start();
      recording = true;
      micBtn.classList.add('recording');
      micBtn.textContent = '⏹️';
      setState('recording', 'Dinlənir...');
    } catch (e) {
      addMsg('err', '⚠️ Mikrofon əlçatan deyil: ' + e.message);
    }
  }

  async function sendAudio(blob) {
    setDisabled(true);
    setState('processing', 'Səs tanınır...');

    const form = new FormData();
    form.append('audio',   blob, 'rec.webm');
    form.append('history', JSON.stringify(history));

    try {
      const resp = await fetch('/api/process', { method: 'POST', body: form });
      await readStream(resp, null);
    } catch (e) {
      addMsg('err', '⚠️ Xəta: ' + e.message);
      setState('', 'Danışmağa hazır');
    } finally {
      setDisabled(false);
      micBtn.textContent = '🎙️';
    }
  }

  function clearChat() {
    history = [];
    conv.innerHTML = `<div class="msg ai"><div class="who">AI</div>Söhbət təmizləndi. Yenidən başlaya bilərsiniz.</div>`;
  }
</script>
</body>
</html>
